name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  contract:
    name: Contract (Rust)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Run contract tests
        run: cargo test -p hello-world --all-targets

      - name: Build contract (wasm release)
        run: cargo build -p hello-world --target wasm32v1-none --release

  frontend:
    name: Frontend (Vite)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test

      - name: Build
        working-directory: frontend
        run: npm run build
